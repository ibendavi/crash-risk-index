name: Update Crash Index Data

on:
  schedule:
    # Run daily at 6 PM ET (11 PM UTC) — after US market close
    - cron: '0 23 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI or API

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests yfinance scipy openpyxl

      - name: Run crash index pipeline
        run: python build_crash_index.py

      - name: Generate dashboard data
        run: python generate_dashboard_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          git diff --cached --quiet || git commit -m "Auto-update dashboard data $(date -u +%Y-%m-%d)"
          git push
