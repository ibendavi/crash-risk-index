name: Update Crash Index Data

on:
  schedule:
    # Run daily at 6 PM ET (11 PM UTC) — after US market close
    - cron: '0 23 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI or API

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests yfinance scipy openpyxl scikit-learn

      - name: Run crash index pipeline
        run: python build_crash_index.py

      - name: Generate dashboard data
        run: python generate_dashboard_data.py

      - name: Validate dashboard data
        run: |
          python -c "import json; d=json.load(open('dashboard_data.json')); assert d['n_models'] >= 10, f'Only {d[\"n_models\"]} models found, expected >= 10'"

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          git diff --cached --quiet || git commit -m "Auto-update dashboard data $(date -u +%Y-%m-%d)"
          git push

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Dashboard data update failed (${new Date().toISOString().slice(0,10)})`,
              body: `The daily dashboard data update workflow failed.\n\nSee [run logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['bug']
            });
